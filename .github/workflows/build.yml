name: Build Standard Functional System Dialer APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Android Project Structure Automatically
      run: |
        echo "Creating directories..."
        mkdir -p app/src/main/java/com/example/vcdialer
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable

        # 1. Create root build.gradle
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF

        # 2. Create settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "VCDialer"
        include ':app'
        EOF

        # 3. Create gradle.properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.nonTransitiveRClass=true
        EOF

        # 4. Create app/build.gradle
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.example.vcdialer'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.vcdialer"
                minSdk 28
                targetSdk 34
                versionCode 1
                versionName "1.1.1"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

        # 5. Create AndroidManifest.xml
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            
            <uses-permission android:name="android.permission.CALL_PHONE" />
            <uses-permission android:name="android.permission.MANAGE_OWN_CALLS" />
            <uses-permission android:name="android.permission.READ_PHONE_STATE" />

            <application
                android:allowBackup="true"
                android:label="My Simple Dialer"
                android:theme="@style/Theme.AppCompat.NoActionBar">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTask">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                    <intent-filter>
                        <action android:name="android.intent.action.DIAL" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <data android:scheme="tel" />
                    </intent-filter>
                    <intent-filter>
                        <action android:name="android.intent.action.DIAL" />
                        <category android:name="android.intent.category.DEFAULT" />
                    </intent-filter>
                </activity>

                <activity
                    android:name=".InCallActivity"
                    android:launchMode="singleInstance"
                    android:excludeFromRecents="true"
                    android:exported="false" />

                <service
                    android:name=".CustomInCallService"
                    android:permission="android.permission.BIND_INCALL_SERVICE"
                    android:exported="true">
                    <meta-data
                        android:name="android.telecom.IN_CALL_SERVICE_UI"
                        android:value="true" />
                    <intent-filter>
                        <action android:name="android.telecom.InCallService" />
                    </intent-filter>
                </service>
                
            </application>
        </manifest>
        EOF

        # 6. Create UI Drawables
        cat << 'EOF' > app/src/main/res/drawable/card_bg.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#1A1924" />
            <corners android:radius="16dp" />
            <stroke android:width="1dp" android:color="#2A283A"/>
        </shape>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/btn_call_bg.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#00C853" />
            <corners android:radius="30dp" />
        </shape>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/btn_hangup_bg.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#D50000" />
            <corners android:radius="30dp" />
        </shape>
        EOF

        # 7. Create App Colors
        cat << 'EOF' > app/src/main/res/values/colors.xml
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="bg_dark">#0F0E17</color>
            <color name="blue_premium">#2979FF</color>
            <color name="text_gray">#8E8C9A</color>
            <color name="white">#FFFFFF</color>
        </resources>
        EOF

        # 8. Main UI Layout (Dialer Screen)
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="@color/bg_dark"
            android:orientation="vertical"
            android:padding="20dp"
            android:gravity="center_horizontal">

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="SIMPLE SYSTEM DIALER"
                android:textColor="@color/white"
                android:textSize="22sp"
                android:textStyle="bold"
                android:layout_marginTop="40dp"
                android:layout_marginBottom="30dp"/>

            <Button
                android:id="@+id/btnSetDefault"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:text="SET AS DEFAULT PHONE APP"
                android:textColor="@color/white"
                android:backgroundTint="@color/blue_premium"
                android:layout_marginBottom="30dp"
                android:textStyle="bold"/>

            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:background="@drawable/card_bg"
                android:orientation="vertical"
                android:padding="16dp"
                android:layout_marginBottom="40dp">
                
                <EditText
                    android:id="@+id/edtNumber"
                    android:layout_width="match_parent"
                    android:layout_height="60dp"
                    android:hint="Enter Number to Call"
                    android:textColorHint="@color/text_gray"
                    android:textColor="@color/white"
                    android:inputType="phone"
                    android:textSize="26sp"
                    android:gravity="center"
                    android:background="@android:color/transparent"/>
            </LinearLayout>

            <Button
                android:id="@+id/btnCall"
                android:layout_width="220dp"
                android:layout_height="60dp"
                android:background="@drawable/btn_call_bg"
                android:text="CALL NOW"
                android:textColor="@color/white"
                android:textStyle="bold"
                android:textSize="18sp"
                android:elevation="4dp"/>

        </LinearLayout>
        EOF

        # 9. In-Call Layout UI
        cat << 'EOF' > app/src/main/res/layout/activity_in_call.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="@color/bg_dark"
            android:orientation="vertical"
            android:gravity="center"
            android:padding="20dp">

            <TextView
                android:id="@+id/txtCallStatus"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="DIALING..."
                android:textColor="@color/blue_premium"
                android:textSize="16sp"
                android:textStyle="bold"
                android:layout_marginBottom="10dp"/>

            <TextView
                android:id="@+id/txtPhoneNumber"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Unknown Number"
                android:textColor="@color/white"
                android:textSize="28sp"
                android:textStyle="bold"
                android:layout_marginBottom="80dp"/>

            <Button
                android:id="@+id/btnHangup"
                android:layout_width="150dp"
                android:layout_height="60dp"
                android:background="@drawable/btn_hangup_bg"
                android:text="END CALL"
                android:textColor="@color/white"
                android:textStyle="bold"
                android:textSize="16sp"
                android:elevation="4dp"/>

        </LinearLayout>
        EOF

        # 10. CustomInCallService.java
        cat << 'EOF' > app/src/main/java/com/example/vcdialer/CustomInCallService.java
        package com.example.vcdialer;

        import android.content.Intent;
        import android.telecom.Call;
        import android.telecom.InCallService;

        public class CustomInCallService extends InCallService {
            private static Call currentCall = null;

            public static Call getCurrentCall() {
                return currentCall;
            }

            @Override
            public void onCallAdded(Call call) {
                super.onCallAdded(call);
                currentCall = call;
                
                String number = "Unknown";
                if (call.getDetails() != null && call.getDetails().getHandle() != null) {
                    number = call.getDetails().getHandle().getSchemeSpecificPart();
                }

                Intent intent = new Intent(this, InCallActivity.class);
                intent.putExtra("NUMBER", number);
                intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                startActivity(intent);
            }

            @Override
            public void onCallRemoved(Call call) {
                super.onCallRemoved(call);
                currentCall = null;
            }
        }
        EOF

        # 11. InCallActivity.java
        cat << 'EOF' > app/src/main/java/com/example/vcdialer/InCallActivity.java
        package com.example.vcdialer;

        import android.os.Bundle;
        import android.telecom.Call;
        import android.view.View;
        import android.widget.Button;
        import android.widget.TextView;
        import androidx.appcompat.app.AppCompatActivity;

        public class InCallActivity extends AppCompatActivity {
            private TextView txtCallStatus, txtPhoneNumber;
            private Button btnHangup;

            private Call.Callback callCallback = new Call.Callback() {
                @Override
                public void onStateChanged(Call call, int state) {
                    super.onStateChanged(call, state);
                    updateCallState(state);
                }
            };

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_in_call);

                txtCallStatus = findViewById(com.example.vcdialer.R.id.txtCallStatus);
                txtPhoneNumber = findViewById(com.example.vcdialer.R.id.txtPhoneNumber);
                btnHangup = findViewById(com.example.vcdialer.R.id.btnHangup);

                String number = getIntent().getStringExtra("NUMBER");
                if (number != null) {
                    txtPhoneNumber.setText(number);
                }

                final Call activeCall = CustomInCallService.getCurrentCall();
                if (activeCall != null) {
                    activeCall.registerCallback(callCallback);
                    updateCallState(activeCall.getState());
                } else {
                    finish();
                }

                btnHangup.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        if (activeCall != null) {
                            activeCall.disconnect();
                        }
                        finish();
                    }
                });
            }

            private void updateCallState(int state) {
                if (state == Call.STATE_ACTIVE) {
                    txtCallStatus.setText("CALL ACTIVE");
                } else if (state == Call.STATE_RINGING) {
                    txtCallStatus.setText("RINGING...");
                } else if (state == Call.STATE_DIALING) {
                    txtCallStatus.setText("DIALING...");
                } else if (state == Call.STATE_DISCONNECTED) {
                    finish();
                }
            }

            @Override
            protected void onDestroy() {
                super.onDestroy();
                Call activeCall = CustomInCallService.getCurrentCall();
                if (activeCall != null) {
                    activeCall.unregisterCallback(callCallback);
                }
            }
        }
        EOF

        # 12. MainActivity.java
        cat << 'EOF' > app/src/main/java/com/example/vcdialer/MainActivity.java
        package com.example.vcdialer;

        import android.Manifest;
        import android.app.role.RoleManager;
        import android.content.Context;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.net.Uri;
        import android.os.Build;
        import android.os.Bundle;
        import android.telecom.TelecomManager;
        import android.view.View;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;

        public class MainActivity extends AppCompatActivity {
            private EditText edtNumber;
            private Button btnCall, btnSetDefault;
            private static final int REQUEST_CODE_SET_DEFAULT = 456;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                edtNumber = findViewById(com.example.vcdialer.R.id.edtNumber);
                btnCall = findViewById(com.example.vcdialer.R.id.btnCall);
                btnSetDefault = findViewById(com.example.vcdialer.R.id.btnSetDefault);

                if (ActivityCompat.checkSelfPermission(this, Manifest.permission.CALL_PHONE) != PackageManager.PERMISSION_GRANTED) {
                    ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CALL_PHONE, Manifest.permission.READ_PHONE_STATE}, 201);
                }

                btnSetDefault.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        checkAndRequestDialerRole();
                    }
                });

                btnCall.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        String number = edtNumber.getText().toString().trim();
                        if (!number.isEmpty()) {
                            executeDial(number);
                        } else {
                            Toast.makeText(MainActivity.this, "Enter a target number!", Toast.LENGTH_SHORT).show();
                        }
                    }
                });
            }

            private void checkAndRequestDialerRole() {
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                    RoleManager roleManager = (RoleManager) getSystemService(Context.ROLE_SERVICE);
                    if (roleManager != null) {
                        if (roleManager.isRoleHeld(RoleManager.ROLE_DIALER)) {
                            Toast.makeText(this, "Simple Dialer is already Default!", Toast.LENGTH_SHORT).show();
                        } else {
                            Intent intent = roleManager.createRequestRoleIntent(RoleManager.ROLE_DIALER);
                            startActivityForResult(intent, REQUEST_CODE_SET_DEFAULT);
                        }
                    }
                } else {
                    TelecomManager telecomManager = (TelecomManager) getSystemService(Context.TELECOM_SERVICE);
                    if (telecomManager != null && !getPackageName().equals(telecomManager.getDefaultDialerPackage())) {
                        Intent intent = new Intent(TelecomManager.ACTION_CHANGE_DEFAULT_DIALER)
                                .putExtra(TelecomManager.EXTRA_CHANGE_DEFAULT_DIALER_PACKAGE_NAME, getPackageName());
                        startActivityForResult(intent, REQUEST_CODE_SET_DEFAULT);
                    }
                }
            }

            private void executeDial(String phoneNumber) {
                Intent callIntent = new Intent(Intent.ACTION_CALL);
                callIntent.setData(Uri.parse("tel:" + Uri.encode(phoneNumber)));
                
                if (ActivityCompat.checkSelfPermission(this, Manifest.permission.CALL_PHONE) == PackageManager.PERMISSION_GRANTED) {
                    startActivity(callIntent);
                } else {
                    Toast.makeText(this, "Permission missing!", Toast.LENGTH_SHORT).show();
                }
            }
        }
        EOF

        # 13. Setup Gradle Wrapper
        gradle wrapper --gradle-version 8.4

    - name: Grant Execu
