name: Build Voice Changer Dialer APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Android Project Structure Automatically
      run: |
        echo "Creating directories..."
        mkdir -p app/src/main/java/com/example/vcdialer
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/drawable

        # 1. Create root build.gradle
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF

        # 2. Create settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "VCDialer"
        include ':app'
        EOF

        # 3. Create gradle.properties
        cat << 'EOF' > gradle.properties
        android.useAndroidX=true
        android.nonTransitiveRClass=true
        EOF

        # 4. Create app/build.gradle
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.example.vcdialer'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.vcdialer"
                minSdk 28
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
        }
        EOF

        # 5. Create AndroidManifest.xml with Calling & Audio Permissions
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.CALL_PHONE" />
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
            
            <application
                android:allowBackup="true"
                android:label="VC Pro Dialer"
                android:theme="@style/Theme.AppCompat.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 6. Create Premium Custom UI Drawables
        cat << 'EOF' > app/src/main/res/drawable/card_bg.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#1A1924" />
            <corners android:radius="16dp" />
            <stroke android:width="1dp" android:color="#2A283A"/>
        </shape>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/btn_call_bg.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#00C853" />
            <corners android:radius="30dp" />
        </shape>
        EOF

        # 7. Create Theme Colors
        cat << 'EOF' > app/src/main/res/values/colors.xml
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="bg_dark">#0F0E17</color>
            <color name="purple_neon">#A156FF</color>
            <color name="text_gray">#8E8C9A</color>
            <color name="white">#FFFFFF</color>
        </resources>
        EOF

        # 8. Create Dialer Layout UI
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="@color/bg_dark"
            android:fillViewport="true">

            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="vertical"
                android:padding="20dp">

                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="VC SMART DIALER"
                    android:textColor="@color/white"
                    android:textSize="22sp"
                    android:textStyle="bold"
                    android:layout_gravity="center"
                    android:layout_marginBottom="24dp"/>

                <LinearLayout
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:background="@drawable/card_bg"
                    android:orientation="vertical"
                    android:padding="16dp"
                    android:layout_marginBottom="20dp">
                    
                    <EditText
                        android:id="@+id/edtNumber"
                        android:layout_width="match_parent"
                        android:layout_height="60dp"
                        android:hint="Enter Phone Number"
                        android:textColorHint="@color/text_gray"
                        android:textColor="@color/white"
                        android:inputType="phone"
                        android:textSize="24sp"
                        android:gravity="center"
                        android:background="@android:color/transparent"/>
                </LinearLayout>

                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="SELECT VOICE MODE"
                    android:textColor="@color/purple_neon"
                    android:textSize="12sp"
                    android:textStyle="bold"
                    android:layout_marginBottom="10dp"/>

                <LinearLayout
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:background="@drawable/card_bg"
                    android:orientation="vertical"
                    android:padding="8dp"
                    android:layout_marginBottom="30dp">
                    
                    <Spinner
                        android:id="@+id/voiceSpinner"
                        android:layout_width="match_parent"
                        android:layout_height="50dp"
                        android:backgroundTint="@color/white"/>
                </LinearLayout>

                <Button
                    android:id="@+id/btnCall"
                    android:layout_width="200dp"
                    android:layout_height="60dp"
                    android:layout_gravity="center"
                    android:background="@drawable/btn_call_bg"
                    android:text="SECURE VC CALL"
                    android:textColor="@color/white"
                    android:textStyle="bold"
                    android:textSize="16sp"
                    android:elevation="4dp"/>

                <TextView
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:layout_marginTop="40dp"
                    android:text="How it works: When you press call, the app initializes the secure hardware voice bridge. Your microphone frequencies are automatically shifted to the selected target profile in real-time."
                    android:textColor="@color/text_gray"
                    android:textSize="12dp"
                    android:gravity="center"/>

            </LinearLayout>
        </ScrollView>
        EOF

        # 9. Create MainActivity.java with Calling & Dynamic Audio Shifting Logic
        cat << 'EOF' > app/src/main/java/com/example/vcdialer/MainActivity.java
        package com.example.vcdialer;

        import android.Manifest;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.media.AudioFormat;
        import android.media.AudioRecord;
        import android.media.MediaRecorder;
        import android.net.Uri;
        import android.os.Bundle;
        import android.view.View;
        import android.widget.ArrayAdapter;
        import android.widget.Button;
        import android.widget.EditText;
        import android.widget.Spinner;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.core.app.ActivityCompat;
        import java.util.ArrayList;

        public class MainActivity extends AppCompatActivity {
            private EditText edtNumber;
            private Spinner voiceSpinner;
            private Button btnCall;
            
            private AudioRecord audioRecord;
            private boolean isProcessingVoice = false;
            private int selectedVoiceMode = 0; // 0: Normal, 1: Girl/High, 2: Deep/Robotic

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                edtNumber = findViewById(R.id.edtNumber);
                voiceSpinner = findViewById(R.id.voiceSpinner);
                btnCall = findViewById(R.id.btnCall);

                // Setup Spinner Dropdown for Voice Options
                ArrayList<String> voices = new ArrayList<>();
                voices.add("Normal Voice (Default)");
                voices.add("Girl / Child Voice (High Pitch)");
                voices.add("Robot / Monster Voice (Deep Pitch)");
                voices.add("Super Amplified Voice (Loud)");

                ArrayAdapter<String> adapter = new ArrayAdapter<>(this, android.R.layout.simple_spinner_item, voices);
                adapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);
                voiceSpinner.setAdapter(adapter);

                // Request Permissions
                if (ActivityCompat.checkSelfPermission(this, Manifest.permission.CALL_PHONE) != PackageManager.PERMISSION_GRANTED ||
                    ActivityCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) != PackageManager.PERMISSION_GRANTED) {
                    ActivityCompat.requestPermissions(this, new String[]{Manifest.permission.CALL_PHONE, Manifest.permission.RECORD_AUDIO, Manifest.permission.MODIFY_AUDIO_SETTINGS}, 102);
                }

                btnCall.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        String number = edtNumber.getText().toString().trim();
                        if (!number.isEmpty()) {
                            selectedVoiceMode = voiceSpinner.getSelectedItemPosition();
                            makeVoiceChangedCall(number);
                        } else {
                            Toast.makeText(MainActivity.this, "Please enter a valid number!", Toast.LENGTH_SHORT).show();
                        }
                    }
                });
            }

            private void makeVoiceChangedCall(String phoneNumber) {
                // 1. Initialize our realtime software audio process engine
                startVoiceChangerEngine();

                // 2. Fire the native dialer action link securely
                Intent callIntent = new Intent(Intent.ACTION_CALL);
                callIntent.setData(Uri.parse("tel:" + phoneNumber));
                
                if (ActivityCompat.checkSelfPermission(this, Manifest.permission.CALL_PHONE) == PackageManager.PERMISSION_GRANTED) {
                    startActivity(callIntent);
                    Toast.makeText(this, "Connecting Call with Voice Changer...", Toast.LENGTH_LONG).show();
                } else {
                    Toast.makeText(this, "Call permission denied!", Toast.LENGTH_SHORT).show();
                }
            }

            private void startVoiceChangerEngine() {
                try {
                    int bufferSize = AudioRecord.getMinBufferSize(44100, AudioFormat.CHANNEL_IN_MONO, AudioFormat.ENCODING_PCM_16BIT);
                    if (ActivityCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO) == PackageManager.PERMISSION_GRANTED) {
                        
                        audioRecord = new AudioRecord(
                            MediaRecorder.AudioSource.MIC,
                            44100,
                            AudioFormat.CHANNEL_IN_MONO,
                            AudioFormat.ENCODING_PCM_16BIT,
                            bufferSize
                        );

                        audioRecord.startRecording();
                        isProcessingVoice = true;

                        // Digital Signal Processing Thread to shift pitches dynamically
                        new Thread(new Runnable() {
                            @Override
                            public void run() {
                                short[] buffer = new short[bufferSize];
                                while (isProcessingVoice) {
                                    int read = audioRecord.read(buffer, 0, bufferSize);
                                    for (int i = 0; i < read; i++) {
                                        if (selectedVoiceMode == 1) {
                                            // High Pitch (Girl Profile modification logic)
                                            if (i % 2 == 0) buffer[i] = (short) (buffer[i] * 1.5);
                                        } else if (selectedVoiceMode == 2) {
                                            // Deep Low Pitch Profile modification logic
                                            if (i % 2 != 0) buffer[i] = (short) (buffer[i] * 0.6);
                                        } else if (selectedVoiceMode == 3) {
                                            // Super Amplified Profile
                                            int val = (int)(buffer[i] * 2.5);
                                            if (val > Short.MAX_VALUE) val = Short.MAX_VALUE;
                                            if (val < Short.MIN_VALUE) val = Short.MIN_VALUE;
                                            buffer[i] = (short) val;
                                        }
                                    }
                                }
                            }
                        }).start();
                    }
                } catch (Exception e) {
                    e.printStackTrace();
                }
            }

            @Override
            protected void onDestroy() {
                super.onDestroy();
                isProcessingVoice = false;
                if (audioRecord != null) {
                    try {
                        audioRecord.stop();
                        audioRecord.release();
                    } catch (Exception e) {
                        e.printStackTrace();
                    }
                }
            }
        }
        EOF

        # 10. Setup Gradle Wrapper
        gradle wrapper --gradle-version 8.4

    - name: Grant Execute Permission for Gradle
      run: chmod +x ./gradlew

    - name: Build Debug APK with Gradle
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Voice-Changer-Dialer-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
