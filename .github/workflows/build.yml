name: Build Face Detection Camera App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Generate Project
      run: |
        mkdir -p app/src/main/java/com/example/facedetector
        
        # 1. build.gradle
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.example.facedetector'
            compileSdk 34
            defaultConfig {
                applicationId "com.example.facedetector"
                minSdk 24
                targetSdk 34
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.camera:camera-camera2:1.3.1'
            implementation 'androidx.camera:camera-lifecycle:1.3.1'
            implementation 'androidx.camera:camera-view:1.3.1'
            implementation 'com.google.mlkit:face-detection:16.1.5'
        }
        EOF

        # 2. MainActivity.java (Face detection engine)
        cat << 'EOF' > app/src/main/java/com/example/facedetector/MainActivity.java
        package com.example.facedetector;

        import android.Manifest;
        import android.graphics.Canvas;
        import android.graphics.Color;
        import android.graphics.Paint;
        import android.graphics.Rect;
        import android.os.Bundle;
        import android.view.View;
        import androidx.appcompat.app.AppCompatActivity;
        import androidx.camera.core.*;
        import androidx.camera.lifecycle.ProcessCameraProvider;
        import androidx.camera.view.PreviewView;
        import androidx.core.content.ContextCompat;
        import com.google.mlkit.vision.face.Face;
        import com.google.mlkit.vision.face.FaceDetection;
        import com.google.mlkit.vision.face.FaceDetector;
        import com.google.mlkit.vision.common.InputImage;
        import java.util.concurrent.Executors;

        public class MainActivity extends AppCompatActivity {
            private PreviewView previewView;
            private GraphicOverlay overlay;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                overlay = new GraphicOverlay(this);
                previewView = new PreviewView(this);
                setContentView(previewView);
                addContentView(overlay, new android.view.ViewGroup.LayoutParams(-1, -1));

                if (checkSelfPermission(Manifest.permission.CAMERA) == 0) startCamera();
                else requestPermissions(new String[]{Manifest.permission.CAMERA}, 101);
            }

            private void startCamera() {
                ProcessCameraProvider.getInstance(this).addListener(() -> {
                    try {
                        Preview preview = new Preview.Builder().build();
                        preview.setSurfaceProvider(previewView.getSurfaceProvider());
                        ImageAnalysis analysis = new ImageAnalysis.Builder().build();
                        FaceDetector detector = FaceDetection.getClient();

                        analysis.setAnalyzer(Executors.newSingleThreadExecutor(), proxy -> {
                            @SuppressWarnings("ExperimentalGetImage")
                            InputImage image = InputImage.fromMediaImage(proxy.getImage(), proxy.getImageInfo().getRotationDegrees());
                            detector.process(image).addOnSuccessListener(faces -> {
                                overlay.setFaces(faces);
                            }).addOnCompleteListener(t -> proxy.close());
                        });

                        ProcessCameraProvider.getInstance(this).get().bindToLifecycle(this, CameraSelector.DEFAULT_BACK_CAMERA, preview, analysis);
                    } catch (Exception e) { e.printStackTrace(); }
                }, ContextCompat.getMainExecutor(this));
            }
        }

        class GraphicOverlay extends View {
            private java.util.List<Face> faces;
            private Paint paint = new Paint();
            public GraphicOverlay(android.content.Context c) { super(c); paint.setColor(Color.GREEN); paint.setStyle(Paint.Style.STROKE); paint.setStrokeWidth(8f); }
            public void setFaces(java.util.List<Face> f) { this.faces = f; postInvalidate(); }
            @Override
            protected void onDraw(Canvas canvas) {
                if (faces != null) for (Face f : faces) canvas.drawRect(f.getBoundingBox(), paint);
            }
        }
        EOF

        # 3. AndroidManifest
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.CAMERA"/>
            <application android:label="Face Detector" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # Final build steps
        gradle wrapper --gradle-version 8.4
        chmod +x ./gradlew
        ./gradlew assembleDebug
        find . -name "*.apk" -exec cp {} ./app-debug.apk \;
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Face-Detector-APK
        path: ./app-debug.apk
